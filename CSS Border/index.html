<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Border UI Style</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    color: #e0e0f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    margin-bottom: 28px;
    color: #c4b8ff;
  }

  .main {
    display: flex;
    gap: 32px;
    width: 100%;
    max-width: 820px;
    align-items: flex-start;
  }

  /* LEFT COLUMN */
  .left {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    flex: 0 0 auto;
  }

  .preview-wrap {
    width: 240px;
    height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #16213e;
    border-radius: 14px;
    padding: 24px;
  }

  #preview-box {
    width: 160px;
    height: 200px;
    background: rgba(255,255,255,0.04);
    border: 8px solid #5246e0;
    border-style: solid;
    border-radius: 28px;
    transition: border-color 0.15s, border-width 0.15s, border-radius 0.15s, border-style 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .preview-inner {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(174,160,255,0.18);
  }

  .style-label {
    font-size: 0.82rem;
    color: #9b8fd4;
    text-align: center;
    min-height: 1.4em;
    letter-spacing: 0.01em;
  }

  /* CODE BLOCK */
  .code-block {
    width: 240px;
    background: #0f0f1e;
    border: 1px solid #2a2a4a;
    border-radius: 10px;
    padding: 14px 16px;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 0.78rem;
    line-height: 1.7;
    color: #c0b8ff;
    white-space: pre;
    position: relative;
  }

  .code-block .prop { color: #7ec8e3; }
  .code-block .val  { color: #e0a870; }
  .code-block .punc { color: #888; }

  .copy-btn {
    position: absolute;
    top: 8px; right: 8px;
    background: #2a2a4a;
    border: none;
    border-radius: 6px;
    color: #9b8fd4;
    font-size: 0.7rem;
    padding: 3px 8px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .copy-btn:hover { background: #6e5bec; color: #fff; }

  /* RIGHT COLUMN */
  .right {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .section-title {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #6a6a9a;
    margin-bottom: 10px;
  }

  /* STYLE PILLS */
  .style-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .style-btn {
    background: #16213e;
    border: 1px solid #2a2a4a;
    border-radius: 20px;
    color: #a0a0c8;
    font-size: 0.8rem;
    padding: 6px 16px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
    font-family: inherit;
  }
  .style-btn:hover {
    background: #1e1e3a;
    border-color: #6e5bec;
    color: #d0c8ff;
    transform: translateY(-1px);
  }
  .style-btn.active {
    background: #6e5bec;
    border-color: #6e5bec;
    color: #fff;
    font-weight: 600;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .control-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .control-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.82rem;
    color: #a0a0c8;
  }

  .control-label span.val {
    color: #c4b8ff;
    font-weight: 600;
    font-size: 0.8rem;
  }

  input[type="range"] {
    width: 100%;
    height: 4px;
    appearance: none;
    background: #2a2a4a;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #6e5bec;
    border: 2px solid #1a1a2e;
    transition: transform 0.1s;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #6e5bec;
    border: 2px solid #1a1a2e;
    cursor: pointer;
  }

  .color-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .color-swatch {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    border: 2px solid #2a2a4a;
    flex: 0 0 auto;
    transition: background 0.1s;
  }

  input[type="color"] {
    width: 100%;
    height: 32px;
    border: none;
    background: #16213e;
    border-radius: 6px;
    cursor: pointer;
    padding: 2px;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }

  @media (max-width: 580px) {
    .main { flex-direction: column; align-items: center; }
    .left, .code-block, .preview-wrap { width: 100%; max-width: 320px; }
  }
</style>
</head>
<body>

<h1>CSS Border UI Style</h1>

<div class="main">
  <!-- LEFT -->
  <div class="left">
    <div class="preview-wrap">
      <div id="preview-box"><div class="preview-inner"></div></div>
    </div>
    <div class="style-label" id="style-label">solid &mdash; Standard solid line</div>
    <div class="code-block" id="code-block">
<button class="copy-btn" id="copy-btn">copy</button><span id="code-output"></span></div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div>
      <div class="section-title">Border Style</div>
      <div class="style-list" id="style-list"></div>
    </div>

    <div class="controls">
      <div class="section-title">Controls</div>

      <div class="control-row">
        <div class="control-label">
          <span>Width</span>
          <span class="val" id="width-val">8px</span>
        </div>
        <input type="range" id="width-slider" min="1" max="20" value="8">
      </div>

      <div class="control-row">
        <div class="control-label">
          <span>Radius</span>
          <span class="val" id="radius-val">28px</span>
        </div>
        <input type="range" id="radius-slider" min="0" max="60" value="28">
      </div>

      <div class="control-row">
        <div class="control-label"><span>Color</span></div>
        <div class="color-row">
          <div class="color-swatch" id="color-swatch" style="background:#5246e0"></div>
          <input type="color" id="color-picker" value="#5246e0">
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const styles = [
    { name: 'solid',  desc: 'Standard solid line' },
    { name: 'dashed', desc: 'Evenly spaced dashes' },
    { name: 'dotted', desc: 'Round dots' },
    { name: 'double', desc: 'Two parallel lines' },
    { name: 'groove', desc: '3D carved look' },
    { name: 'ridge',  desc: '3D raised look' },
    { name: 'inset',  desc: 'Sunken 3D effect' },
    { name: 'outset', desc: 'Raised 3D effect' },
    { name: 'none',   desc: 'No border rendered' },
    { name: 'hidden', desc: 'Border hidden (space kept)' },
  ];

  let state = { style: 'solid', width: 8, radius: 28, color: '#5246e0' };

  const box      = document.getElementById('preview-box');
  const label    = document.getElementById('style-label');
  const codeOut  = document.getElementById('code-output');
  const list     = document.getElementById('style-list');
  const widthSlider  = document.getElementById('width-slider');
  const radiusSlider = document.getElementById('radius-slider');
  const colorPicker  = document.getElementById('color-picker');
  const widthVal  = document.getElementById('width-val');
  const radiusVal = document.getElementById('radius-val');
  const swatch    = document.getElementById('color-swatch');
  const copyBtn   = document.getElementById('copy-btn');

  function render() {
    const { style, width, radius, color } = state;
    box.style.borderStyle  = style;
    box.style.borderWidth  = width + 'px';
    box.style.borderRadius = radius + 'px';
    box.style.borderColor  = color;

    const desc = styles.find(s => s.name === style)?.desc || '';
    label.innerHTML = `<strong style="color:#c4b8ff">${style}</strong> &mdash; ${desc}`;

    const css =
      `<span class="prop">border-style</span><span class="punc">: </span><span class="val">${style}</span><span class="punc">;</span>\n` +
      `<span class="prop">border-width</span><span class="punc">: </span><span class="val">${width}px</span><span class="punc">;</span>\n` +
      `<span class="prop">border-radius</span><span class="punc">: </span><span class="val">${radius}px</span><span class="punc">;</span>\n` +
      `<span class="prop">border-color</span><span class="punc">: </span><span class="val">${color}</span><span class="punc">;</span>`;
    codeOut.innerHTML = css;
  }

  // Build style buttons
  styles.forEach(({ name }) => {
    const btn = document.createElement('button');
    btn.className = 'style-btn' + (name === state.style ? ' active' : '');
    btn.textContent = name;
    btn.addEventListener('click', () => {
      state.style = name;
      document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
    list.appendChild(btn);
  });

  widthSlider.addEventListener('input', () => {
    state.width = +widthSlider.value;
    widthVal.textContent = state.width + 'px';
    render();
  });

  radiusSlider.addEventListener('input', () => {
    state.radius = +radiusSlider.value;
    radiusVal.textContent = state.radius + 'px';
    render();
  });

  colorPicker.addEventListener('input', () => {
    state.color = colorPicker.value;
    swatch.style.background = state.color;
    render();
  });

  copyBtn.addEventListener('click', () => {
    const { style, width, radius, color } = state;
    const text = `border-style: ${style};\nborder-width: ${width}px;\nborder-radius: ${radius}px;\nborder-color: ${color};`;
    navigator.clipboard.writeText(text).then(() => {
      copyBtn.textContent = 'copied!';
      setTimeout(() => copyBtn.textContent = 'copy', 1500);
    });
  });

  render();
</script>
</body>
</html>
